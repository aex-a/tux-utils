---
- name: Deploy q-length network monitoring daemon
  hosts: all
  become: true
  vars:
    monitor_ip: "1.1.1.1"
    monitor_thr: "50"

  tasks:
    - name: Copy q-length.sh to /usr/local/bin
      copy:
        src: ../services/q-length.sh
        dest: /usr/local/bin/q-length.sh
        mode: '0755'

    - name: Copy systemd service file
      copy:
        src: ../services/systemd-units/q-length.service
        dest: /etc/systemd/system/q-length.service
        mode: '0644'
      notify:
        - reload systemd
        - restart q-length

    - name: Create q-length configuration file
      copy:
        dest: /etc/q-length.conf
        content: |
          IP="{{ monitor_ip }}"
          THR="{{ monitor_thr }}"
        mode: '0644'
      notify: restart q-length

    - name: Ensure q-length service is enabled and started
      systemd:
        name: q-length.service
        enabled: true
        state: started

  handlers:
    - name: reload systemd
      systemd:
        daemon_reload: true
       
    - name: restart q-length
      systemd:
        name: q-length.service
        state: restarted
    
